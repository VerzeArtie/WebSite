    /* Prevent double vertical scrollbars: hide page-level scroll and let iframe scroll itself */
    html, body, .app { height: 100%; overflow: hidden; }
    .content-frame-wrap { overflow: hidden; display: flex; flex-direction: column; }
    .content-frame-wrap iframe { width: 100%; height: 100%; border: 0; }

  <script>
    // initialize menu toggle after DOM is ready
    document.addEventListener('DOMContentLoaded', function(){
      // toggle sidebar for narrow screens
      const toggleBtn = document.getElementById('toggleMenu');
      const ov = document.getElementById('overlay');
      if (toggleBtn) {
        toggleBtn.addEventListener('click', () => {
          document.body.classList.toggle('menu-open');
          if (document.body.classList.contains('menu-open')) {
            if (ov) ov.style.display = 'block';
          } else {
            if (ov) ov.style.display = 'none';
          }
        });
      }
      if (ov) {
        ov.addEventListener('click', () => {
          document.body.classList.remove('menu-open');
          ov.style.display = 'none';
        });
      }
    });
  </script>
