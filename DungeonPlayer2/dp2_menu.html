<script>
  // If this menu is embedded inside the main shell, hijack link clicks
  // and load pages into the parent's contentFrame to keep the menu persistent.
  (function(){
    try {
      var parentDoc = window.parent && window.parent.document;
      var contentFrame = parentDoc && parentDoc.getElementById && parentDoc.getElementById('contentFrame');
      if (!contentFrame) return; // not embedded, keep default behavior

      function handleClick(e){
        var a = e.currentTarget;
        var href = a.getAttribute('href');
        if (!href) return;
        // allow mailto and anchors to behave normally
        if (href.indexOf('mailto:') === 0 || href.indexOf('#') === 0) return;
        e.preventDefault();
        contentFrame.src = href;
      }

      var anchors = document.querySelectorAll('a[href]');
      anchors.forEach(function(a){
        a.addEventListener('click', handleClick, false);
        a.addEventListener('click', function(){
          try{ if (window.parent && window.parent.document) {
            var ov = window.parent.document.getElementById('overlay');
            window.parent.document.body.classList.remove('menu-open');
            if (ov) ov.style.display = 'none';
          }}catch(e){}
        }, false);
      });
    } catch (err) {
      // ignore cross-origin or other errors
    }
  })();
</script>
